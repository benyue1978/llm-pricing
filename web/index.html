<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LLM Pricing Registry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark light;
        --bg: #050816;
        --card-bg: rgba(15, 23, 42, 0.96);
        --accent: #38bdf8;
        --border-subtle: rgba(148, 163, 184, 0.4);
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #0f172a 0, #020617 50%, #000 100%);
        color: var(--text-main);
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 32px 16px;
      }
      main {
        width: 100%;
        max-width: 1100px;
        background: var(--card-bg);
        border-radius: 18px;
        border: 1px solid var(--border-subtle);
        box-shadow:
          0 24px 60px rgba(15, 23, 42, 0.9),
          0 0 0 1px rgba(15, 23, 42, 0.8);
        padding: 20px 20px 24px;
        backdrop-filter: blur(18px);
      }
      header {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      h1 span {
        color: var(--accent);
      }
      #updated-at {
        margin: 0;
        font-size: 12px;
        color: var(--text-muted);
        font-variant-numeric: tabular-nums;
      }
      #error-banner {
        display: none;
        margin-bottom: 12px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(248, 113, 113, 0.5);
        background: rgba(127, 29, 29, 0.4);
        color: #fecaca;
        font-size: 12px;
      }
      #pricing-table-container {
        border-radius: 14px;
        border: 1px solid var(--border-subtle);
        overflow: hidden;
        background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.98), #020617);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead {
        background: rgba(15, 23, 42, 0.9);
      }
      th,
      td {
        padding: 8px 10px;
        text-align: left;
        border-bottom: 1px solid rgba(30, 41, 59, 0.9);
      }
      th {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        white-space: nowrap;
      }
      tbody tr:nth-child(even) {
        background: rgba(15, 23, 42, 0.75);
      }
      tbody tr:hover {
        background: rgba(15, 23, 42, 0.95);
      }
      td.model-cell {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
      }
      td.price-cell {
        font-variant-numeric: tabular-nums;
      }
      td a {
        color: var(--accent);
        text-decoration: none;
      }
      td a:hover {
        text-decoration: underline;
      }
      #empty-state {
        padding: 24px 16px;
        text-align: center;
        color: var(--text-muted);
        font-size: 13px;
      }
      @media (max-width: 720px) {
        main {
          padding: 14px 12px 18px;
        }
        th,
        td {
          padding: 6px 8px;
        }
        h1 {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1><span>LLM</span> Pricing Registry</h1>
        <p id="updated-at">Loading pricing data...</p>
      </header>
      <div id="error-banner" role="alert"></div>
      <div id="pricing-table-container">
        <div id="empty-state">Fetching latest model pricing…</div>
        <div id="pricing-table"></div>
      </div>
    </main>
    <script src="./main.js" type="module"></script>
  </body>
</html>
