<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Stacked bars: registry / pricing list -->
  <g fill="white" fill-opacity="0.92">
    <rect x="18" y="20" width="28" height="6" rx="2"/>
    <rect x="18" y="32" width="22" height="6" rx="2"/>
    <rect x="18" y="44" width="26" height="6" rx="2"/>
  </g>
  <!-- Accent: tag/pricing badge -->
  <rect x="44" y="22" width="14" height="24" rx="7" fill="url(#accent)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c75b12;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a2711;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff6ef;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f4efe7;stop-opacity:1"/>
    </linearGradient>
  </defs>
</svg>
